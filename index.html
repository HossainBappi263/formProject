<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>placeholder</title>
</head>
<body>
    <h1>Registration Form</h1>
    <form>
        <h3>First name</h3>
        <input type="text" name="" id="" placeholder="First Name">
        <h3>last Name</h3>
        <input type="text" name="" id="" placeholder="Last Name">
        <h3>Password</h3>
        <input type="password" name="" id="" placeholder="Password">
        <h3>Birth Date</h3>
        <input type="Date" name="" id="" placeholder="Birth Date">
        <h3>Gender</h3>
        <input type="radio" name="Men" id="" placeholder="Gender">Male 
        <input type="radio" name="Men" id="" placeholder="Gender">Female  
        <input type="radio" name="Men" id="" placeholder="Gender">Others 
        <h3>Your Hobies</h3>
        <input type="checkbox" name="" id="">Football 
        <input type="checkbox" name="" id="">Cricket 
        <input type="checkbox" name="" id="">Traveler 
        <input type="checkbox" name="" id="">Coding 
        <input type="checkbox" name="" id="">Driving 
        <input type="checkbox" name="" id="">Advencer
        <h3>Your Phone Number</h3>
        <input type="number" name="" id="" placeholder="Your Phone Number">
        <h3>Your Religion</h3>
        <input type="radio" name="Religion" id="">Islam
        <input type="radio" name="Religion" id="">Hindu
        <input type="radio" name="Religion" id=""> Others
        <h3>Your E-mail</h3>
        <input type="email" name="" id="" placeholder="Your E-mail">
        <h3>Your Range</h3>
        <input type="range" name="" id="" placeholder="Your Range">
        <h3>Your Favourite Color</h3>
        <input type="color" name="" id="Your Favourite Color">
        <h3>File</h3>
        <input type="file" name="" id="" placeholder="file">
        <h3>Your Department</h3>
        <select name="" id="">

            <option value="">Science</option>
            <option value="">Commerce</option>
            <option value="">Arts</option>

        </select>
        <h3>Message</h3>
        <textarea cols="30" rows="20"></textarea>
        <h3>Submit</h3>
        <input type="submit" name="" id="" placeholder="Submit">

    </form>
</body>
</html>
